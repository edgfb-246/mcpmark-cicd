name: Deployment Status
on:
  push:
    branches: [main]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get previous commit SHA
        id: get_previous_commit
        run: echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: echo "package_version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create_artifact.outputs.artifact_name }}
      sha256_checksum: ${{ steps.calculate_checksum.outputs.sha256_checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback process..."

          if [ -z "${PREVIOUS_COMMIT:-}" ]; then
            echo "Error: PREVIOUS_COMMIT environment variable not set"
            exit 1
          fi

          echo "Checking out previous commit: $PREVIOUS_COMMIT"
          git checkout $PREVIOUS_COMMIT

          echo "Reinstalling dependencies..."
          npm install

          echo "Verifying dependencies..."
          npm run test -- --watchAll=false

          echo "Rollback completed successfully"
          EOF
          chmod +x rollback.sh

      - name: Create dependency verification script
        run: |
          cat > check-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependency compatibility..."

          NODE_VERSION=$(node -v)
          echo "Node.js version: $NODE_VERSION"

          NPM_VERSION=$(npm -v)
          echo "npm version: $NPM_VERSION"

          if [ ! -d node_modules ]; then
            echo "Error: node_modules directory not found"
            exit 1
          fi

          echo "Dependency verification completed successfully"
          EOF
          chmod +x check-deps.sh

      - name: Create rollback documentation
        run: |
          cat > rollback-docs.md << 'EOF'
          # Rollback Documentation

          ## Step-by-Step Rollback Instructions

          1. **Stop running application**:
             ```bash
             pm2 stop all || true
             ```

          2. **Switch to previous commit**:
             ```bash
             git checkout $PREVIOUS_COMMIT
             ```

          3. **Reinstall dependencies**:
             ```bash
             npm install
             ```

          4. **Verify application**:
             ```bash
             npm run test -- --watchAll=false
             ```

          5. **Restart application**:
             ```bash
             pm2 start all || true
             ```

          ## Troubleshooting

          - If git checkout fails: Ensure you have the commit in local history
          - If npm install fails: Clear npm cache with `npm cache clean --force`
          EOF

      - name: Backup configuration files
        run: |
          mkdir -p rollback-backups
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          if [ -f .env.example ]; then
            cp .env.example rollback-backups/
          fi

      - name: Create rollback package
        id: create_artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          zip -r "${ARTIFACT_NAME}.zip" rollback.sh check-deps.sh rollback-docs.md rollback-backups/
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 checksum
        id: calculate_checksum
        run: |
          SHA256=$(sha256sum "${{ steps.create_artifact.outputs.artifact_name }}.zip" | awk '{print $1}')
          echo "sha256_checksum=${SHA256}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_artifact.outputs.artifact_name }}
          path: ${{ steps.create_artifact.outputs.artifact_name }}.zip
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
### 🔄 Rollback Plan Ready
- Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
- Current Commit: ${{ github.sha }}
- Package Version: ${{ needs.pre-deployment.outputs.package_version }}
- Artifact: ${{ steps.create_artifact.outputs.artifact_name }}

✅ Rollback script created
✅ Configuration backups completed
✅ Dependency verification script created
✅ Rollback documentation generated
✅ Rollback package compressed

### Quick Rollback Command
\`\`\`bash
# Set previous commit SHA
export PREVIOUS_COMMIT=${{ needs.pre-deployment.outputs.previous_commit }}

# Run rollback script
./rollback.sh
\`\`\`

- Rollback script created: true
- Configuration backup: true
- SHA256: ${{ steps.calculate_checksum.outputs.sha256_checksum }}
              `
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
Deployment Completed Successfully

Rollback Artifact Details:
- Artifact Name: ${{ needs.rollback-preparation.outputs.artifact_name }}
- SHA256 Checksum: ${{ needs.rollback-preparation.outputs.sha256_checksum }}
              `
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}